<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro | CompostEco</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="../public/images/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" type="text/css"
    href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="shortcut icon" href="../public/images/favicon.ico" type="image/x-icon">
</head>

<body class="page-body">
  <div class="register-card">

    <div class="image-panel">
      <img src="../assets/images/field2.png" alt="">
      <div class="back-button" onclick="window.location.href='../index.html'">
        <i class="ph ph-arrow-left"></i>
      </div>
      <div class="caption">
        <i class="ph ph-info"></i>
        <span>Tome decisões mais rápidas e precisas com base em informações confiáveis.</span>
      </div>
    </div>

    <div class="form-panel">
      <img class="logo" src="../assets/icon/logo-dark.svg" alt="Logo CompostECO">

      <div class="form-fields">
        <div class="field-group">
          <label for="inpCode">Código de ativação:</label>
          <input type="text" id="inpCode" placeholder="ex: A1B2C3">
          <span id="errCode"></span>
        </div>
        <div class="field-group">
          <label for="inpName">Nome:</label>
          <input type="text" id="inpName" placeholder="ex: Maria Silva">
          <span id="errName"></span>
        </div>
        <div class="field-group">
          <label for="inpEmail">Email:</label>
          <input type="email" id="inpEmail" placeholder="ex: exemplo@corp.com">
          <span id="errEmail"></span>
        </div>
        <div class="field-group">
          <label for="inpPassword">Senha:</label>
          <input type="password" id="inpPassword">
          <span id="errPassword"></span>
        </div>
        <div class="field-group">
          <label for="inpConfirm">Confirmar senha:</label>
          <input type="password" id="inpConfirm">
          <span id="errConfirm"></span>
        </div>

        <button class="submit-button">Cadastrar</button>
      </div>

      <a href="../login/index.html" class="login">Já tem uma conta? <span class="login-link">Acesse-a aqui.</span></a>
    </div>

  </div>
  <div id="popUp"></div>
</body>

</html>
