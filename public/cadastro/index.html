<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro</title>

  <!-- <link rel="stylesheet" href="style.css"> -->
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../login/style.css">
  <link rel="stylesheet" type="text/css"
    href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />
</head>

<body>

  <!-- CADASTRO -->
  <main class="cadastro-page">
    <a href="../index.html" class="back">
      <i class="ph ph-sign-out"></i>
    </a>
    <div class="cadastro-card">

      <img src="../assets/icon/logo.svg" alt="Logo">

      <h2 class="heading-lg">Cadastre-se</h2>
      <p class="body-xs">Cadastre-se para usufruir da plataforma</p>

      <span class="input-with-label">
        <label for="ipt_code" class="label-input">Código de ativação</label>
        <input type="text" placeholder="Código" id="ipt_code">
      </span>

      <span class="input-with-label">
        <label class="label-input" for="ipt_username">Nome de usuário</label>
        <input type="text" placeholder="username" id="ipt_username">
      </span>

      <span class="input-with-label">
        <label class="label-input" for="ipt_email">Email</label>
        <input type="email" placeholder="Email" id="ipt_email">
      </span>

      <span class="input-with-label">
        <label class="label-input" class="label-input" for="ipt_password">Senha</label>
        <input type="password" placeholder="Senha" id="ipt_password">
      </span>

      <span class="input-with-label">
        <label class="label-input" for="ipt_password_confirm">Confirmar senha</label>
        <input type="password" placeholder="Confirmar senha" id="ipt_password_confirm">
      </span>

      <button class="button-primary-dark">Cadastrar</button>

      <a href="../login/index.html" id="link-criar-conta" class="link body-sm">
        <p>Já tem uma conta?</p>
      </a>

    </div>

  </main>

</body>

</html>
