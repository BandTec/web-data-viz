<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" type="text/css"
    href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />
    <script src="../js/autenticar.js"></script>
</head>

<body>

  <!-- login -->
  <main class="cadastro-page">
    <a href="../index.html" class="back">
      <i class="ph ph-sign-out"></i>
    </a>
    <div class="cadastro-card">

      <img src="../assets/icon/logo.svg" alt="Logo">

      <h2 class="heading-lg">Bem-Vindo de Volta</h2>
      <p class="body-xs">Faça login para acessar a plataforma</p>

      <span class="input-with-label">
        <label for="ipt_email">Email</label>
        <input type="email" placeholder="Email" id="ipt_email">
        <span id="error_email" class="body-xs"></span>
      </span>

      <span class="input-with-label">
        <label for="ipt_password">Senha</label>
        <input type="password" placeholder="Senha" id="ipt_password">
        <span id="error_password" class="body-xs"></span>
      </span>
      <a href="#" class="body-xs link link-recuperar-senha">Esqueceu a senha?</a>

      <button class="button-primary-dark" onclick="login()">Entrar</button>

      <a href="../cadastro/index.html" id="link-criar-conta" class="link body-sm">
        <p>Ainda não tem uma conta? Cadastre-se</p>
      </a>

    </div>
  </main>
  <div id="popUp"></div>
</body>

</html>
