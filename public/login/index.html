<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | CompostEco</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="../public/images/favicon.ico" type="image/x-icon">
  <script src="script.js"></script>
  <link rel="stylesheet" type="text/css"
    href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />
    <link rel="shortcut icon" href="../public/images/favicon.ico" type="image/x-icon">
</head>

<body class="page-body">
  <div class="login-card">

    <div class="image-panel">
      <img src="../assets/images/field.png" alt="">
      <div class="back-button" onclick="window.location.href='../index.html'">
        <i class="ph ph-arrow-left"></i>
      </div>
      <div class="caption">
        <i class="ph ph-info"></i>
        <span>Acompanhe temperatura e umidade continuamente, com dados atualizados diretamente da composteira.</span>
      </div>
    </div>

    <div class="form-panel">
      <img class="logo" src="../assets/icon/logo-dark.svg" alt="Logo CompostECO">

      <div class="form-fields">
        <div class="field-group">
          <label for="inpEmail">Email:</label>
          <input type="email" id="inpEmail" placeholder="exemplo@corp.com">
          <span id="errEmail"></span>
        </div>

        <div class="field-group">
          <label for="inpPassword">Senha:</label>
          <input type="password" id="inpPassword">
          <span id="errPassword"></span>
          <a class="forgot-link">Esqueceu a senha?</a>
        </div>

        <button class="submit-button" onclick="login()">Entrar</button>
      </div>

      <a href="../cadastro/index.html" class="register">Ainda não tem uma conta? <span class="register-link">Crie aqui.</span></a>
    </div>

  </div>
  <div id="popUp"></div>
</body>

</html>
